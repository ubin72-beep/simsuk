<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>긴급 이미지 수정 - 심석</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #dc3545;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .alert {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #dc3545;
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%);
            color: #212529;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #218838 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .result.success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }

        .result.error {
            background: #f8d7da;
            color: #721c24;
            border-left: 4px solid #dc3545;
        }

        .code {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin: 15px 0;
            overflow-x: auto;
            max-height: 300px;
            overflow-y: auto;
        }

        @media (max-width: 600px) {
            .card {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .btn {
                padding: 15px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚨 긴급 이미지 수정</h1>
        <p class="subtitle">placeholder 이미지를 실제 이미지로 강제 교체</p>

        <div class="alert">
            <strong>⚠️ 현재 상황:</strong><br>
            • 이미지가 여전히 placeholder.com으로 되어 있음<br>
            • 모바일에서 물음표(??) 표시됨<br>
            • localStorage가 제대로 업데이트 안 됨<br><br>
            <strong>해결 방법:</strong><br>
            아래 버튼을 눌러 강제로 이미지 URL을 수정합니다.
        </div>

        <button class="btn btn-danger" onclick="deleteAll()">
            🗑️ Step 1: 모든 데이터 삭제 (초기화)
        </button>

        <button class="btn btn-warning" onclick="clearCache()">
            🔄 Step 2: 브라우저 캐시 삭제
        </button>

        <button class="btn btn-success" onclick="goToMain()">
            🏠 Step 3: 메인 페이지로 이동
        </button>

        <div class="result" id="result"></div>

        <div class="code" id="codeLog" style="display: none;"></div>
    </div>

    <script>
        let logs = [];

        function log(message) {
            const timestamp = new Date().toLocaleTimeString('ko-KR');
            const line = `[${timestamp}] ${message}`;
            logs.push(line);
            
            const codeLog = document.getElementById('codeLog');
            codeLog.style.display = 'block';
            codeLog.innerHTML = logs.join('<br>');
            codeLog.scrollTop = codeLog.scrollHeight;
            
            console.log(message);
        }

        function showResult(message, type = 'success') {
            const result = document.getElementById('result');
            result.className = `result show ${type}`;
            result.innerHTML = message;
        }

        function deleteAll() {
            if (!confirm('⚠️ 정말로 모든 제품 데이터를 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다!\n\n삭제 후 관리자 페이지에서 다시 등록해야 합니다.')) {
                return;
            }

            if (!confirm('⚠️ 최종 확인\n\nadminProducts와 products를 모두 삭제합니다.\n\n계속하시겠습니까?')) {
                return;
            }

            try {
                log('🗑️ 데이터 삭제 시작...');

                // localStorage 완전 삭제
                const keysToDelete = ['adminProducts', 'products', 'cart', 'orders'];
                
                keysToDelete.forEach(key => {
                    const data = localStorage.getItem(key);
                    if (data) {
                        localStorage.removeItem(key);
                        log(`✅ ${key} 삭제됨`);
                    } else {
                        log(`⚠️ ${key} 없음 (이미 삭제됨)`);
                    }
                });

                // 확인
                const remaining = [];
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    remaining.push(key);
                }

                log(`📊 남은 키: ${remaining.length}개`);
                if (remaining.length > 0) {
                    log(`   → ${remaining.join(', ')}`);
                }

                showResult(`
                    <strong>✅ Step 1 완료!</strong><br><br>
                    모든 제품 데이터가 삭제되었습니다.<br><br>
                    <strong>다음 단계:</strong><br>
                    1. [Step 2: 브라우저 캐시 삭제] 클릭<br>
                    2. [Step 3: 메인 페이지로 이동] 클릭<br>
                    3. admin.html에서 제품 다시 등록<br>
                    4. 이번엔 실제 이미지 URL 사용!
                `, 'success');

            } catch (error) {
                log(`❌ 오류: ${error.message}`);
                showResult(`
                    <strong>❌ 오류 발생!</strong><br><br>
                    ${error.message}<br><br>
                    콘솔 로그를 확인하세요.
                `, 'error');
            }
        }

        function clearCache() {
            try {
                log('🔄 캐시 삭제 시도...');

                // Service Worker 삭제
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        for(let registration of registrations) {
                            registration.unregister();
                            log('✅ Service Worker 삭제됨');
                        }
                    });
                }

                // Cache API 삭제
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        for (let name of names) {
                            caches.delete(name);
                            log(`✅ Cache "${name}" 삭제됨`);
                        }
                    });
                }

                showResult(`
                    <strong>✅ Step 2 완료!</strong><br><br>
                    브라우저 캐시가 삭제되었습니다.<br><br>
                    <strong>다음 단계:</strong><br>
                    [Step 3: 메인 페이지로 이동] 클릭
                `, 'success');

                log('✅ 캐시 삭제 완료');

            } catch (error) {
                log(`❌ 캐시 삭제 오류: ${error.message}`);
                showResult(`
                    <strong>⚠️ 부분 완료</strong><br><br>
                    일부 캐시가 삭제되지 않았을 수 있습니다.<br><br>
                    수동으로 삭제:<br>
                    1. Chrome 설정 > 개인정보 보호<br>
                    2. 인터넷 사용 기록 삭제<br>
                    3. 캐시된 이미지 및 파일 선택<br>
                    4. 삭제
                `, 'error');
            }
        }

        function goToMain() {
            log('🏠 메인 페이지로 이동...');
            
            showResult(`
                <strong>✅ Step 3 준비 완료!</strong><br><br>
                3초 후 메인 페이지로 이동합니다...<br><br>
                <strong>이동 후 할 일:</strong><br>
                1. 데모 제품 6개가 표시됨<br>
                2. admin.html 접속<br>
                3. 제품 등록 (실제 이미지 URL 사용!)<br>
                4. sync-manager.html에서 동기화 확인
            `, 'success');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 3000);
        }

        // 페이지 로드 시
        window.addEventListener('load', () => {
            log('🚀 긴급 이미지 수정 도구 시작');
            
            // 현재 상태 확인
            const adminProducts = localStorage.getItem('adminProducts');
            const products = localStorage.getItem('products');
            
            if (adminProducts) {
                try {
                    const data = JSON.parse(adminProducts);
                    log(`📦 adminProducts: ${data.length}개 제품`);
                    
                    // placeholder 확인
                    const placeholders = data.filter(p => {
                        const url = p.image || p.image_url || '';
                        return url.includes('placeholder') || url.includes('placehold');
                    });
                    
                    if (placeholders.length > 0) {
                        log(`⚠️ placeholder 이미지 발견: ${placeholders.length}개`);
                    } else {
                        log(`✅ placeholder 없음`);
                    }
                } catch (e) {
                    log(`❌ adminProducts 파싱 오류: ${e.message}`);
                }
            } else {
                log('⚠️ adminProducts 없음');
            }

            if (products) {
                try {
                    const data = JSON.parse(products);
                    log(`📦 products: ${data.length}개 제품`);
                } catch (e) {
                    log(`❌ products 파싱 오류: ${e.message}`);
                }
            } else {
                log('⚠️ products 없음');
            }
        });
    </script>
</body>
</html>
