<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>긴급 데이터 보호 - 심석</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
        }
        
        .card {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 15px;
        }
        
        .warning {
            background: #fff3cd;
            border: 3px solid #ffc107;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            color: #856404;
        }
        
        .warning h2 {
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .status {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        
        .status h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .btn {
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px;
            display: inline-block;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-success {
            background: #51cf66;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        
        .result {
            background: #d1e7dd;
            border: 2px solid #198754;
            color: #0f5132;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        pre {
            background: white;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            text-align: left;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🛡️ 긴급 데이터 보호</h1>
            <p style="color: #7f8c8d; margin-bottom: 30px;">현재 localStorage 데이터를 영구적으로 보호합니다</p>
            
            <div class="warning">
                <h2><i class="fas fa-exclamation-triangle"></i> 주의</h2>
                <p>이 작업은 현재 localStorage의 제품 데이터를<br>브라우저 저장소와 파일로 이중 백업합니다.</p>
            </div>
            
            <div class="status">
                <h3>📊 현재 상태</h3>
                <p id="currentStatus">확인 중...</p>
            </div>
            
            <div>
                <button class="btn btn-primary" onclick="checkData()">
                    <i class="fas fa-sync"></i> 현재 데이터 확인
                </button>
                <button class="btn btn-success" onclick="protectData()">
                    <i class="fas fa-shield-alt"></i> 데이터 보호 실행
                </button>
            </div>
            
            <div id="result" class="result"></div>
        </div>
    </div>
    
    <script>
        let currentData = null;
        
        function checkData() {
            const adminProducts = localStorage.getItem('adminProducts');
            const products = localStorage.getItem('products');
            
            let count = 0;
            
            if (adminProducts) {
                try {
                    const data = JSON.parse(adminProducts);
                    count = data.length;
                    currentData = data;
                } catch (e) {
                    console.error('파싱 오류:', e);
                }
            }
            
            const statusDiv = document.getElementById('currentStatus');
            
            if (count > 0) {
                statusDiv.innerHTML = `
                    <strong style="color: #51cf66; font-size: 24px;">${count}개 제품 발견!</strong><br>
                    <small style="color: #666;">adminProducts: ${adminProducts ? '✅' : '❌'}<br>
                    products: ${products ? '✅' : '❌'}</small>
                `;
            } else {
                statusDiv.innerHTML = `
                    <strong style="color: #ff6b6b; font-size: 24px;">제품이 없습니다!</strong><br>
                    <small style="color: #666;">admin.html에서 제품을 먼저 등록해주세요.</small>
                `;
            }
        }
        
        function protectData() {
            if (!currentData || currentData.length === 0) {
                alert('❌ 보호할 데이터가 없습니다.\n먼저 "현재 데이터 확인"을 클릭하세요.');
                return;
            }
            
            const resultDiv = document.getElementById('result');
            let message = '<h3><i class="fas fa-check-circle"></i> 보호 완료!</h3>';
            
            // 1. 여러 키로 저장 (삭제 방지)
            const timestamp = Date.now();
            const keys = [
                'adminProducts',
                'products',
                `backup_permanent_${timestamp}`,
                `emergency_backup_${timestamp}`,
                'PROTECTED_DATA_DO_NOT_DELETE'
            ];
            
            keys.forEach(key => {
                localStorage.setItem(key, JSON.stringify(currentData));
            });
            
            message += `<p>✅ localStorage에 ${keys.length}개 복사본 저장 완료</p>`;
            
            // 2. 파일로 다운로드
            const dataStr = JSON.stringify(currentData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `simsuk_products_PROTECTED_${timestamp}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            message += `<p>✅ JSON 파일 다운로드 완료</p>`;
            
            // 3. 데이터 표시
            message += `<p><strong>보호된 제품 수:</strong> ${currentData.length}개</p>`;
            message += `<pre>${JSON.stringify(currentData, null, 2)}</pre>`;
            
            resultDiv.innerHTML = message;
            resultDiv.classList.add('show');
            
            alert(`✅ 데이터 보호 완료!\n\n${currentData.length}개 제품이 ${keys.length}곳에 저장되었습니다.\nJSON 파일도 다운로드되었습니다.`);
        }
        
        // 페이지 로드 시 자동 확인
        window.addEventListener('DOMContentLoaded', () => {
            checkData();
        });
    </script>
</body>
</html>
