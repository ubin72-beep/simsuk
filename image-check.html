<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>이미지 체크 - 심석</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #2b5c4a 0%, #1a4034 100%);
            min-height: 100vh;
            padding: 15px;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 15px;
        }

        h1 {
            color: #2b5c4a;
            font-size: 22px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .product-item {
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .product-name {
            font-weight: 700;
            font-size: 16px;
            color: #2b5c4a;
        }

        .product-id {
            font-size: 12px;
            color: #999;
        }

        .image-section {
            margin: 15px 0;
        }

        .image-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
        }

        .image-url {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            word-break: break-all;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .image-preview {
            position: relative;
            width: 100%;
            padding-top: 100%;
            background: #f5f5f5;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e9ecef;
        }

        .image-preview img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .image-status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
        }

        .image-status.success {
            background: #d4edda;
            color: #155724;
        }

        .image-status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2b5c4a 0%, #1a4034 100%);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffc107 0%, #e0a800 100%);
            color: #212529;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }

        .console {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(43, 92, 74, 0.3);
            border-top-color: #2b5c4a;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .fix-section {
            background: #fff3cd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }

        .fix-title {
            font-weight: 700;
            color: #856404;
            margin-bottom: 10px;
        }

        .fix-list {
            font-size: 13px;
            line-height: 1.8;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="card">
            <h1>🖼️ 이미지 체크</h1>
            <p class="subtitle">제품 이미지가 안 보이는 문제 진단</p>
            
            <div class="alert alert-info">
                <strong>📌 이 도구는:</strong><br>
                • 등록된 제품의 이미지 URL 확인<br>
                • 이미지 로딩 상태 테스트<br>
                • 잘못된 URL 자동 감지<br>
                • 수정 방법 제안
            </div>

            <button class="btn btn-primary" onclick="checkImages()">🔍 이미지 전체 체크</button>
        </div>

        <!-- Products -->
        <div id="productsContainer"></div>

        <!-- Console -->
        <div class="card">
            <h3 style="margin-bottom: 15px; color: #2b5c4a;">📝 진단 로그</h3>
            <div class="console" id="consoleLog"></div>
        </div>
    </div>

    <script>
        let consoleLines = [];

        function log(message) {
            const timestamp = new Date().toLocaleTimeString('ko-KR');
            const line = `[${timestamp}] ${message}`;
            
            consoleLines.push(line);
            if (consoleLines.length > 30) {
                consoleLines.shift();
            }
            
            const consoleLog = document.getElementById('consoleLog');
            consoleLog.innerHTML = consoleLines.map(l => `<div>${l}</div>`).join('');
            consoleLog.scrollTop = consoleLog.scrollHeight;
            
            console.log(message);
        }

        function checkImages() {
            log('🔍 이미지 체크 시작...');
            
            const container = document.getElementById('productsContainer');
            container.innerHTML = '<div class="card"><div class="loading"><div class="spinner"></div><div style="margin-top: 10px;">로딩 중...</div></div></div>';
            
            try {
                // localStorage에서 제품 데이터 로드
                const adminProducts = localStorage.getItem('adminProducts');
                const products = localStorage.getItem('products');
                
                const data = adminProducts || products;
                
                if (!data) {
                    container.innerHTML = `
                        <div class="card">
                            <div class="empty">
                                📦<br>제품 데이터가 없습니다
                            </div>
                        </div>
                    `;
                    log('❌ 제품 데이터 없음');
                    return;
                }
                
                const productList = JSON.parse(data);
                log(`✅ 제품 ${productList.length}개 발견`);
                
                container.innerHTML = '';
                
                productList.forEach((product, index) => {
                    log(`제품 ${index + 1}: ${product.name}`);
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    
                    // 이미지 URL 추출
                    let imageUrl = null;
                    let imageSource = '';
                    
                    if (product.images && Array.isArray(product.images) && product.images.length > 0) {
                        imageUrl = product.images[0];
                        imageSource = 'images[0]';
                        log(`  → images 배열: ${product.images.length}장`);
                    } else if (product.image) {
                        imageUrl = product.image;
                        imageSource = 'image';
                        log(`  → image 필드 사용`);
                    } else if (product.image_url) {
                        imageUrl = product.image_url;
                        imageSource = 'image_url';
                        log(`  → image_url 필드 사용`);
                    } else {
                        imageSource = '없음';
                        log(`  → ❌ 이미지 없음!`);
                    }
                    
                    // URL 검증
                    let urlStatus = '';
                    let isValidUrl = false;
                    
                    if (imageUrl) {
                        try {
                            const url = new URL(imageUrl);
                            isValidUrl = true;
                            urlStatus = `✅ 유효한 URL (${url.hostname})`;
                            log(`  → ${urlStatus}`);
                        } catch (e) {
                            urlStatus = `❌ 잘못된 URL 형식`;
                            log(`  → ${urlStatus}`);
                        }
                    } else {
                        urlStatus = `❌ URL 없음`;
                        log(`  → ${urlStatus}`);
                    }
                    
                    card.innerHTML = `
                        <div class="product-item">
                            <div class="product-header">
                                <div class="product-name">${product.name}</div>
                                <div class="product-id">ID: ${product.id}</div>
                            </div>
                            
                            <div class="image-section">
                                <div class="image-label">📍 이미지 소스: <strong>${imageSource}</strong></div>
                                ${imageUrl ? `
                                    <div class="image-url">${imageUrl}</div>
                                    <div class="image-label">🖼️ 미리보기:</div>
                                    <div class="image-preview">
                                        <img src="${imageUrl}" 
                                             alt="${product.name}"
                                             id="img-${index}"
                                             onload="imageLoaded(${index}, true)"
                                             onerror="imageLoaded(${index}, false)">
                                    </div>
                                    <div class="image-status" id="status-${index}">테스트 중...</div>
                                ` : `
                                    <div class="image-status error">❌ 이미지 URL이 없습니다</div>
                                    <div class="fix-section">
                                        <div class="fix-title">🔧 해결 방법:</div>
                                        <div class="fix-list">
                                            1. 관리자 페이지에서 제품 수정<br>
                                            2. 이미지 URL 입력<br>
                                            3. 저장 후 다시 확인
                                        </div>
                                    </div>
                                `}
                            </div>
                        </div>
                    `;
                    
                    container.appendChild(card);
                });
                
                log('✅ 이미지 체크 완료');
                
            } catch (error) {
                log(`❌ 오류: ${error.message}`);
                container.innerHTML = `
                    <div class="card">
                        <div class="alert alert-warning">
                            <strong>오류 발생:</strong><br>
                            ${error.message}
                        </div>
                    </div>
                `;
            }
        }

        function imageLoaded(index, success) {
            const statusEl = document.getElementById(`status-${index}`);
            
            if (success) {
                statusEl.className = 'image-status success';
                statusEl.textContent = '✅ 이미지 로딩 성공';
                log(`  → 이미지 ${index + 1}: ✅ 로딩 성공`);
            } else {
                statusEl.className = 'image-status error';
                statusEl.innerHTML = `
                    ❌ 이미지 로딩 실패
                    <div class="fix-section" style="margin-top: 10px;">
                        <div class="fix-title">🔧 가능한 원인:</div>
                        <div class="fix-list">
                            • URL이 잘못됨<br>
                            • 이미지 파일이 삭제됨<br>
                            • 서버 접근 권한 없음<br>
                            • CORS 정책 차단
                        </div>
                    </div>
                `;
                log(`  → 이미지 ${index + 1}: ❌ 로딩 실패`);
            }
        }

        // 페이지 로드 시 자동 체크
        window.addEventListener('load', () => {
            log('🚀 이미지 체크 도구 시작');
            checkImages();
        });
    </script>
</body>
</html>
